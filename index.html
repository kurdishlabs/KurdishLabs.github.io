<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IkurdishI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #7dd3fc;
    --accent2: #f0abfc;
    --accent3: #86efac;
    --dim: rgba(255,255,255,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a0f;
    overflow: hidden;
    font-family: var(--sans);
    color: #fff;
    cursor: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: rgba(125, 211, 252, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: transform 0.08s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: screen;
  }

  .cursor.hovering {
    width: 28px; height: 28px;
    background: rgba(240, 171, 252, 0.6);
  }

  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    user-select: none;
  }

  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(125, 211, 252, 0.35);
    background: linear-gradient(135deg, rgba(125,211,252,0.15), rgba(240,171,252,0.15));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 20px;
    position: relative;
    animation: pulse-ring 3s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(125,211,252,0.12); }
    50% { box-shadow: 0 0 0 14px rgba(125,211,252,0); }
  }

  .name {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #f0f4ff;
    margin-bottom: 10px;
  }

  .name span { color: var(--accent); }

  .roles {
    font-family: var(--mono);
    font-size: clamp(11px, 1.5vw, 13px);
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .roles .r1 { color: var(--accent); }
  .roles .r2 { color: var(--accent2); }
  .roles .r3 { color: var(--accent3); }

  .email {
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(125,211,252,0.4), transparent);
    margin-bottom: 28px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 260px;
    margin-bottom: 28px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    text-decoration: none;
    color: rgba(255,255,255,0.75);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.03em;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    cursor: none;
  }

  .link-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(125,211,252,0.3);
    color: #fff;
    transform: translateX(4px);
  }

  .link-btn svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .link-btn:hover svg { opacity: 1; }

  .link-btn .label { flex: 1; }
  .link-btn .arrow {
    font-size: 10px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s;
  }
  .link-btn:hover .arrow { opacity: 0.7; transform: translateX(2px); }

  .socials {
    display: flex;
    gap: 18px;
    margin-bottom: 0;
  }

  .social-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    color: rgba(255,255,255,0.5);
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    cursor: none;
  }

  .social-btn:hover {
    background: rgba(125,211,252,0.1);
    border-color: rgba(125,211,252,0.35);
    color: var(--accent);
    transform: translateY(-3px);
  }

  .social-btn svg { width: 15px; height: 15px; }

  .hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.08em;
    z-index: 10;
    pointer-events: none;
    animation: fade-in 2s 1.5s both;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .container > * {
    animation: reveal 0.7s ease both;
  }

  .avatar { animation-delay: 0.1s; }
  .name { animation-delay: 0.2s; }
  .roles { animation-delay: 0.3s; }
  .email { animation-delay: 0.35s; }
  .divider { animation-delay: 0.4s; }
  .links { animation-delay: 0.5s; }
  .socials { animation-delay: 0.6s; }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let W, H, mouse = { x: -9999, y: -9999, clicking: false };
let particles = [];
const N = 130;
const MAX_DIST = 120;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

class Particle {
  constructor() { this.reset(true); }

  reset(random) {
    this.x = random ? Math.random() * W : W/2 + (Math.random()-0.5)*200;
    this.y = random ? Math.random() * H : H/2 + (Math.random()-0.5)*200;
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.15 + Math.random() * 0.35;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.size = 1 + Math.random() * 2;
    this.alpha = 0.2 + Math.random() * 0.6;
    this.hue = Math.random() < 0.5 ? 200 : (Math.random() < 0.5 ? 285 : 145);
  }

  update() {
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const repelRadius = mouse.clicking ? 160 : 90;
    const force = mouse.clicking ? 4 : 1.8;

    if (dist < repelRadius && dist > 0) {
      const f = (repelRadius - dist) / repelRadius * force;
      this.vx += (dx / dist) * f * 0.4;
      this.vy += (dy / dist) * f * 0.4;
    }

    const maxSpeed = mouse.clicking ? 4 : 2.5;
    const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (speed > maxSpeed) {
      this.vx = (this.vx/speed) * maxSpeed;
      this.vy = (this.vy/speed) * maxSpeed;
    }

    this.vx *= 0.985;
    this.vy *= 0.985;

    if (Math.sqrt(this.vx*this.vx + this.vy*this.vy) < 0.08) {
      const a = Math.random() * Math.PI * 2;
      this.vx += Math.cos(a) * 0.05;
      this.vy += Math.sin(a) * 0.05;
    }

    this.x += this.vx;
    this.y += this.vy;

    if (this.x < -10) this.x = W+10;
    if (this.x > W+10) this.x = -10;
    if (this.y < -10) this.y = H+10;
    if (this.y > H+10) this.y = -10;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${this.alpha})`;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < N; i++) particles.push(new Particle());
}
init();

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.18)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();

    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < MAX_DIST) {
        const alpha = (1 - dist/MAX_DIST) * 0.18;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(160, 210, 255, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}
draw();

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

window.addEventListener('mousedown', () => {
  mouse.clicking = true;
  cursor.style.width = '20px';
  cursor.style.height = '20px';
});
window.addEventListener('mouseup', () => {
  mouse.clicking = false;
  cursor.style.width = '';
  cursor.style.height = '';
});

document.querySelectorAll('a, .link-btn, .social-btn').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
});
</script>
